<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NoteLock - Password Manager</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Background -->

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<!-- Navbar -->

<nav>

<div class="logo">

<i class="fa-solid fa-shield-halved"></i>

<div>

<h2>NoteLock</h2>

<p>Secure Password Manager</p>

</div>

</div>

<div class="nav-right">

<button id="themeBtn">

<i class="fa-solid fa-moon"></i>

</button>

</div>

</nav>

<!-- Dashboard -->

<section class="dashboard">

<h1>

Manage Your Passwords Securely

</h1>

<p>

Store all your passwords safely in one place.

</p>

<!-- Stats -->

<div class="stats">

<div class="card">

<h2 id="totalPasswords">0</h2>

<span>Total Passwords</span>

</div>

<div class="card">

<h2 id="strongPasswords">0</h2>

<span>Strong Passwords</span>

</div>

<div class="card">

<h2 id="weakPasswords">0</h2>

<span>Weak Passwords</span>

</div>

</div>

<!-- Add Password -->

<div class="form">

<input
type="text"
id="website"
placeholder="Website Name">

<input
type="text"
id="username"
placeholder="Username / Email">

<div class="passwordBox">

<input
type="password"
id="password"
placeholder="Password">

<i
class="fa-solid fa-eye"
id="togglePassword">

</i>

</div>

<button id="generate">

<i class="fa-solid fa-wand-magic-sparkles"></i>

Generate Password

</button>

<button id="save">

<i class="fa-solid fa-circle-plus"></i>

Save Password

</button>

</div>

<!-- Search -->

<div class="search">

<input
type="text"
id="search"
placeholder="Search Website...">

</div>

<!-- Password List -->

<div id="passwordContainer">

<!-- Cards Added Here -->

</div>

</section>

<!-- Toast -->

<div id="toast">

Password Saved Successfully

</div>

<script src="script.js"></script>

</body>
</html>
